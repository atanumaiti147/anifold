// BUG FIX PATCH — Overrides broken functions

window._logoLight = '';
window._logoDark  = '';

(function() {
  const _origToggle = window.toggleDarkMode;
  window.toggleDarkMode = function() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const newTheme = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('af_darkmode', newTheme === 'dark' ? '1' : '0');
    const icon = document.getElementById('menu-dm-icon');
    if (icon) icon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
    applyThemeLogo(newTheme);
  };
})();

function applyThemeLogo(theme) {
  const isDark = theme === 'dark';
  const hl = document.getElementById('head-logo');
  const sl = document.getElementById('side-logo');
  if (isDark && window._logoDark) {
    if (hl) { hl.src = window._logoDark; hl.style.display = 'block'; }
    if (sl) { sl.src = window._logoDark; sl.style.display = 'block'; }
  } else if (!isDark && window._logoLight) {
    if (hl) { hl.src = window._logoLight; hl.style.display = 'block'; }
    if (sl) { sl.src = window._logoLight; sl.style.display = 'block'; }
  }
}

      if (!s.exists()) return;
      const v = s.val();
      if (v.lightLogoUrl) window._logoLight = v.lightLogoUrl;
      if (v.darkLogoUrl)  window._logoDark  = v.darkLogoUrl;
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      applyThemeLogo(isDark ? 'dark' : 'light');
    });
  }
})();
